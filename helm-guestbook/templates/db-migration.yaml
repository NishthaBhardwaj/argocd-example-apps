apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-job
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation, HookSucceeded

spec:
  backOffLimits: 2
  tempate:
    spec:
      restartPolicy: Never
      containers:
        name: migration
        image: busybox
        command:
          - "sh"
          - "-c"
          - "echo 'Running db migration'; sleep 10; echo 'Done!' "
          
